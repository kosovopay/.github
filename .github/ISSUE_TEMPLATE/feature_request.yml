name: 💡 Feature request
description: Suggest an improvement to an SDK or the API.
labels: ["enhancement", "triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the use case first — not just the solution.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: dropdown
    id: surface
    attributes:
      label: Which surface?
      options:
        - PHP SDK
        - Python SDK
        - Go SDK
        - .NET SDK
        - HTTP API
        - All / cross-cutting
    validations:
      required: true
